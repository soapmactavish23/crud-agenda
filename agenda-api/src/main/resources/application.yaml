spring:
  application:
    name: agenda-api
  datasource:
    url: jdbc:mysql://localhost:3306/agenda?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true

  flyway:
    enable: true
    locations: classpath:db/migration